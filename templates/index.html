<!DOCTYPE html>
<html>
<head>
    <title>Blood Cell Classification</title>
</head>
<body style="background-color:#f0f0f0; font-family:Arial;">

    <div style="
        width:500px;
        margin:100px auto;
        padding:30px;
        background:white;
        border-radius:10px;
        box-shadow:0px 0px 10px gray;
        text-align:center;
    ">
        <h1>Upload Blood Cell Image</h1>

        <form action="/predict" method="post" enctype="multipart/form-data">
            <input type="file" name="image" required>
            <br><br>
            <button type="submit" style="padding:10px 20px;">
                Predict
            </button>
        </form>
    </div>

</body>
</html>
